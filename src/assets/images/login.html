<!DOCTYPE html>
<html lang="en-us">
  <head>
    <title>News</title>
    <meta charset="UTF-8" />
    <meta name="description" content="" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css"
    />
    <link type="text/css" rel="stylesheet" href="css/style.css" />
  </head>

  <body>
    <div class="LoginArea">
      <div class="LoginBox">
        <div class="LoginLeft">
          <figure><img src="images/Logo.png" /></figure>
          <!-- <h2>Huk N <span>Buk</span></h2> -->

          <h3><span>Login Your Account</span></h3>
          <h4>
            Enter your email address and password <br />
            to access admin panel.
          </h4>
          <form>
            <div class="form-group">
              <label>Enter Email *</label>
              <input
                type="text"
                placeholder="Enter Email ID"
                class="form-control"
              />
              <span class="Icon"><i class="fa fa-envelope"></i></span>
            </div>

            <div class="form-group">
              <label>Choose a Password *</label>
              <input
                type="password"
                placeholder="Enter Password"
                class="form-control"
              />
              <span class="Icon"><i class="fa fa-unlock-alt"></i></span>
              <span class="icon"
                ><i class="fa fa-eye-slash" aria-hidden="true"></i
              ></span>
            </div>

            <div class="Checkboxs text-right">
              <!-- <label class="CheckBox"
                >Remember Me
                <input type="checkbox" />
                <span class="checkmark"></span>
              </label> -->
              <a href="login-forgot.html" class="underline-link"
                >Forgot password?</a
              >
            </div>

            <a class="Login" href="login-welcome.html"
              >Login <i class="fa fa-sign-in"></i
            ></a>
            <!-- <button>Log In <i class="fa fa-sign-in"></i></button> -->
          </form>
        </div>
      </div>
    </div>

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.4.1/jquery.min.js"></script>
    <script src="js/bootstrap.min.js"></script>
  </body>
</html>
