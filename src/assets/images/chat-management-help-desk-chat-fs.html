<!DOCTYPE html>
<html lang="en-us">
  <head>
    <title>Agro</title>
    <meta charset="UTF-8" />
    <meta name="description" content="" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css"
    />
    <link type="text/css" rel="stylesheet" href="css/style.css" />
  </head>

  <body>
    <section class="chats-full-screen">
      <div class="farmer-chat-single">
        <div class="Small-Wrapper">
          <div class="row chat-containers">
            <div class="col-sm-12">
              <!-- <div class="CustomFilter">
              
                        <a href="group-chat-management-add.html" class="AddBtn">+ Add Group</a>
                    </div> -->
              <div class="chat-panel">
                <div class="chat-header">
                  <div class="chat-item active">
                    <div class="avatar">
                      <img src="images/rohit-avtar.png" />
                    </div>
                    <div class="chat-info">
                      <p class="chat-title">Rahul Singh</p>
                      <!-- <p class="chat-message">12 Users</p> -->
                    </div>
                  </div>
                </div>
                <div class="chat-messages">
                  <div class="message received">
                    <span
                      ><img class="images" src="images/chat-avtar.png"
                    /></span>
                    <p class="message-text">Good morning!</p>
                    <span class="message-time">12:20 AM</span>
                  </div>
                  <div class="message received">
                    <span
                      ><img class="images" src="images/chat-avtar.png"
                    /></span>
                    <p class="message-text">
                      Lorem ipsum dolor sit amet consectetur. Nunc tincidunt at
                      a at a ac.
                    </p>
                    <span class="message-time">12:40 AM</span>
                  </div>
                  <div class="message sent">
                    <span class="message-text">
                      Lorem ipsum dolor sit amet consectetur. Nunc tincidunt at
                      a at a ac.
                    </span>
                    <img class="images-a" src="images/chat-avtar.png" />

                    <span class="message-time">01:00 AM</span>
                  </div>
                  <div class="message sent">
                    <span class="message-text">
                      Lorem ipsum dolor sit amet consectetur. Nunc tincidunt at
                      a at a ac.
                    </span>
                    <img class="images-a" src="images/chat-avtar.png" />

                    <span class="message-time">01:10 AM</span>
                  </div>
                </div>
                <div class="chat-input">
                  <input type="text" placeholder="Type here..." />
                  <span class="camera"
                    ><i class="fa fa-paperclip" aria-hidden="true"></i
                  ></span>
                  <button class="send-btn">➤</button>
                </div>
              </div>
            </div>
          </div>
        </div>
        <a href="chats-management.html" class="close-btn">Close</a>
      </div>
    </section>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.4.1/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.16.0/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.canvasjs.com/canvasjs.min.js"></script>
    <script src="js/script.js"></script>
  </body>
</html>
